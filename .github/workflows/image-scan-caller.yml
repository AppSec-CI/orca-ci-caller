name: Orca Image Scan - Caller
on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

  workflow_dispatch:

permissions: 
  contents: read
  checks: write
  issues: write
  pull-requests: write
  security-events: write
  statuses: write
  
jobs:
  Scan:
    uses: AppSec-CI/orca-ci-resuable-workflow/.github/workflows/orca-image-scan-resuable-workflow.yml@main
    with:
      project_key: slrk
      dockerfile-details: './Dockerfile'
      image_name: raghuesh/image-scan-ci-reusable-workflow
    secrets: inherit
